<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASIO Product Authentication - Final PoC</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    text-align: center;
    padding: 20px;
}
.container {
    background: white;
    border-radius: 12px;
    padding: 25px;
    max-width: 420px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}
.btn {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: bold;
}
.verify { background: #000; }
.attack { background: #c00; font-size: 0.85rem; }

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    display: none;
    text-align: left;
}
.success { background: #e6fffa; }
.fail { background: #fff5f5; }

.small { font-size: 0.75rem; color: gray; margin-top: 15px; }
</style>
</head>

<body>

<div class="container">
    <h3>CASIO Genuine Verification</h3>

    <div id="status">「検証開始」を押してタグをスキャン</div>

    <button class="btn verify" onclick="startScan()">真贋検証</button>
    <button class="btn attack" onclick="attackWrite()">攻撃シナリオ</button>

    <div id="result" class="result"></div>
</div>

<div class="small">
※Android Chrome NFC対応<br>
※UIDは補助情報
</div>

<script>
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");

let scanning = false;
let timeoutId = null;

// ===== 疑似秘密鍵（PoC用）=====
const SECRET = "CASIO_SECRET_KEY";

// ===== ハッシュ =====
function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }
    return hash.toString();
}

// ===== 検証 =====
function verifySignature(id, uid, sig) {
    const expected = simpleHash(id + uid + SECRET);
    return expected === sig;
}

// ===== モッククラウド =====
async function verifyWithCloud(id, uid, sig) {
    await new Promise(r => setTimeout(r, 300));
    return verifySignature(id, uid, sig);
}

// ===== レコードからJSONを抽出（mime と text 両対応）=====
function extractJSON(records) {
    for (const record of records) {
        // mime / application/json
        if (record.recordType === "mime" && record.mediaType === "application/json") {
            try {
                const text = new TextDecoder().decode(record.data);
                const obj = JSON.parse(text);
                if (obj.id && obj.sig) return obj;
            } catch {}
        }
        // text レコード（NFC Tools「テキスト文字」で書き込んだ場合）
        if (record.recordType === "text") {
            try {
                const text = new TextDecoder().decode(record.data);
                // 先頭の言語コードバイトをスキップしてJSONを探す
                const jsonStart = text.indexOf("{");
                if (jsonStart !== -1) {
                    const obj = JSON.parse(text.slice(jsonStart));
                    if (obj.id && obj.sig) return obj;
                }
            } catch {}
        }
    }
    return null;
}

// ===== スキャン =====
async function startScan() {

    if (scanning) return;
    scanning = true;

    if (!("NDEFReader" in window)) {
        alert("Web NFC非対応（Android Chrome）");
        scanning = false;
        return;
    }

    try {
        const ndef = new NDEFReader();
        await ndef.scan();

        statusDiv.innerHTML = "スキャン待機中...";

        // タイムアウト
        timeoutId = setTimeout(() => {
            statusDiv.innerHTML = "タグを検出できませんでした";
            scanning = false;
        }, 10000);

        ndef.onreading = async (event) => {

            clearTimeout(timeoutId);

            const obj = extractJSON(event.message.records);

            if (!obj) {
                showError("有効なデータが見つかりません");
                scanning = false;
                return;
            }

            statusDiv.innerHTML = "クラウド照合中...";

            const ok = await verifyWithCloud(obj.id, event.serialNumber || "", obj.sig);

            if (ok) {
                showSuccess(event.serialNumber, obj.id);
            } else {
                showFake(event.serialNumber, obj.id);
            }

            scanning = false;
        };

        ndef.onreadingerror = () => {
            showError("読み取り失敗。再度かざしてください");
            scanning = false;
        };

    } catch (e) {
        console.error(e);
        showError("スキャンエラーが発生しました");
        scanning = false;
    }
}

// ===== 成功 =====
function showSuccess(uid, id) {
    statusDiv.innerHTML = "検証完了（再スキャン可能）";

    resultDiv.className = "result success";
    resultDiv.style.display = "block";

    resultDiv.innerHTML = `
        <b>✅ AUTHENTIC PRODUCT</b><hr>
        Product ID: ${id}<br>
        UID: ${uid || "取得不可"}（参考情報）<br><br>

        ・識別データ一致<br>
        ・疑似署名検証OK<br>
        ・クラウド照合OK<br><br>

        <b>ビジネス効果</b><br>
        ・模倣品排除<br>
        ・ブランド保護<br>
        ・流通可視化<br><br>

        <small>※本デモは簡易ロジック。本番は公開鍵暗号へ移行</small>
    `;
}

// ===== 偽物 =====
function showFake(uid, id) {
    statusDiv.innerHTML = "検証完了（再スキャン可能）";

    resultDiv.className = "result fail";
    resultDiv.style.display = "block";

    resultDiv.innerHTML = `
        <b>❌ WARNING</b><hr>
        Product ID: ${id || "不明"}<br>
        UID: ${uid || "取得不可"}（参考情報）<br><br>

        ・署名不一致<br>
        ・改ざんまたは未登録<br><br>

        ⚠️ 不正流通の疑い
    `;
}

// ===== エラー =====
function showError(msg) {
    resultDiv.className = "result fail";
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "⚠️ " + msg;
}

// ===== 攻撃 =====
async function attackWrite() {

    try {
        const ndef = new NDEFReader();

        statusDiv.innerHTML = "攻撃者が偽造タグ作成中...";

        const fake = JSON.stringify({ id: "99999", sig: "000000" });

        await ndef.write({
            records: [{
                recordType: "mime",
                mediaType: "application/json",
                data: new TextEncoder().encode(fake)
            }]
        });

        resultDiv.className = "result fail";
        resultDiv.style.display = "block";
        resultDiv.innerHTML = `
            ⚠️ 書き込み成功<br><br>
            → 正規品と見分けがつかない偽造タグ生成が可能
        `;

    } catch (e) {

        resultDiv.className = "result success";
        resultDiv.style.display = "block";
        resultDiv.innerHTML = `
            🛡️ 改ざんブロック成功<br><br>
            書き込みが拒否されました（タグ設定による）
        `;

        statusDiv.innerHTML = "防御成功";
    }
}
</script>

</body>
</html>
