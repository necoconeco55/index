<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYOSAN NFC True Authentication Demo</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    background: #f4f7f9;
    text-align: center;
    padding: 20px;
}
.container {
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    max-width: 420px;
    margin: auto;
}
.logo {
    font-weight: bold;
    color: #003366;
    margin-bottom: 15px;
}
.btn {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}
.verify { background: #003366; }
.attack { background: #cc0000; }

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    display: none;
}
.success { background: #e6fffa; }
.fail { background: #fff5f5; }

.small {
    font-size: 0.8rem;
    color: gray;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">RYOSAN NFC Authentication PoC</div>

    <div id="status">
        「検証開始」を押してタグをスキャン
    </div>

    <button class="btn verify" onclick="startScan()">
        正規アプリ（真贋検証）
    </button>

    <button class="btn attack" onclick="attackWrite()">
        攻撃者シナリオ（書き換え試行）
    </button>

    <div id="result" class="result"></div>
</div>

<div class="small">
※Android Chromeのみ対応 / iOSは専用アプリ対応想定
</div>

<script>
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");

// ===== 擬似クラウドDB =====
const VALID_SIGNATURE = "CASIO_SECURE_SIGNATURE_123";

// ===== スキャン処理 =====
async function startScan() {

    if (!("NDEFReader" in window)) {
        alert("Web NFC非対応です（Android Chromeのみ）");
        return;
    }

    try {
        const ndef = new NDEFReader();
        await ndef.scan();

        statusDiv.innerHTML = "スキャン待機中...";

        ndef.addEventListener("reading", async ({ message, serialNumber }) => {

            let dataText = "";

            for (const record of message.records) {
                const decoder = new TextDecoder();
                dataText = decoder.decode(record.data);
            }

            // ===== 擬似クラウド照合 =====
            const isAuthentic = await verifyWithCloud(serialNumber, dataText);

            if (isAuthentic) {
                showSuccess(serialNumber);
            } else {
                showFake(serialNumber);
            }
        });

    } catch (e) {
        statusDiv.innerText = "エラー：" + e;
    }
}

// ===== クラウド照合（モック） =====
function verifyWithCloud(uid, data) {
    return new Promise(resolve => {

        setTimeout(() => {
            if (data === VALID_SIGNATURE) {
                resolve(true);
            } else {
                resolve(false);
            }
        }, 500);
    });
}

// ===== 成功表示 =====
function showSuccess(uid) {
    statusDiv.innerHTML = "検証完了";

    resultDiv.className = "result success";
    resultDiv.style.display = "block";

    resultDiv.innerHTML = `
        <strong>✅ AUTHENTIC PRODUCT</strong><br>
        UID: ${uid}<br><br>

        <b>検証結果</b><br>
        ・メーカー署名一致<br>
        ・クラウド照合OK<br><br>

        <b>トレーサビリティ</b><br>
        Manufacturing → Distribution → Scan → Verified
    `;
}

// ===== 偽物表示 =====
function showFake(uid) {
    statusDiv.innerHTML = "検証完了";

    resultDiv.className = "result fail";
    resultDiv.style.display = "block";

    resultDiv.innerHTML = `
        <strong>❌ FAKE / UNAUTHORIZED</strong><br>
        UID: ${uid}<br><br>

        <b>異常検知</b><br>
        ・署名不一致<br>
        ・未登録タグ<br><br>

        ⚠️ 不正流通の可能性あり
    `;
}

// ===== 攻撃シナリオ =====
async function attackWrite() {

    try {
        const ndef = new NDEFReader();

        statusDiv.innerHTML = "攻撃者が書き換え試行中...";

        await ndef.write("FAKE_DATA_ATTACK");

        resultDiv.className = "result fail";
        resultDiv.style.display = "block";

        resultDiv.innerHTML = `
            ⚠️ 書き込み成功<br>
            → セキュリティ未設定タグ
        `;

    } catch (e) {

        resultDiv.className = "result success";
        resultDiv.style.display = "block";

        resultDiv.innerHTML = `
            ✅ 攻撃ブロック成功<br><br>
            タグが保護されているため<br>
            不正書き換え不可
        `;
    }
}
</script>

</body>
</html>
