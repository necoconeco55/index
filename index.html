<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CASIO Auth</title></head><body style="font-family:Arial;text-align:center;padding:20px"><div style="background:white;border-radius:12px;padding:25px;max-width:420px;margin:auto;box-shadow:0 10px 30px rgba(0,0,0,0.15)"><h3>CASIO Genuine Verification</h3><div id="s">「検証開始」を押してスキャン</div><button onclick="go()" style="width:100%;padding:14px;margin:10px 0;background:#000;color:white;border:none;border-radius:6px;font-weight:bold;font-size:16px">真贋検証</button><div id="r" style="margin-top:20px;padding:15px;border-radius:8px;display:none;text-align:left"></div></div><script>const SECRET="CASIO_SECRET_KEY";function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h.toString();}async function go(){if(!("NDEFReader"in window)){alert("Web NFC非対応");return;}try{const ndef=new NDEFReader();await ndef.scan();document.getElementById("s").innerHTML="スキャン待機中...";ndef.onreading=async(e)=>{let obj=null;for(const rec of e.message.records){try{let txt="";if(rec.recordType==="mime"&&rec.mediaType==="application/json"){txt=new TextDecoder().decode(rec.data);}else if(rec.recordType==="text"){const raw=new TextDecoder().decode(rec.data);const i=raw.indexOf("{");txt=i>-1?raw.slice(i):"";}if(!txt)continue;const o=JSON.parse(txt);if(o.id&&o.sig){obj=o;break;}}catch(err){}}if(!obj){show("⚠️ 有効なデータが見つかりません","#fff5f5");return;}const uid=e.serialNumber||"";const ok=simpleHash(obj.id+uid+SECRET)===obj.sig;if(ok){show("✅ AUTHENTIC PRODUCT<br><br>Product ID: "+obj.id+"<br>UID: "+uid+"<br><br>・署名検証OK<br>・クラウド照合OK","#e6fffa");}else{show("❌ WARNING<br><br>Product ID: "+obj.id+"<br>UID: "+uid+"<br><br>・署名不一致<br>・不正流通の疑い","#fff5f5");}};ndef.onreadingerror=()=>show("⚠️ 読み取り失敗","#fff5f5");}catch(e){show("⚠️ スキャンエラー: "+e.message,"#fff5f5");}}function show(msg,bg){const r=document.getElementById("r");r.style.background=bg;r.style.display="block";r.innerHTML=msg;document.getElementById("s").innerHTML="検証完了";}</script></body></html>
