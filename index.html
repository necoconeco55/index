<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASIO Product Authentication (Improved PoC)</title>

<style>
body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #f0f2f5;
    text-align: center;
    padding: 20px;
}
.container {
    background: white;
    border-radius: 12px;
    padding: 30px 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    max-width: 400px;
    margin: auto;
    border-top: 5px solid #000;
}
.logo {
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 20px;
}
.btn {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: bold;
}
.verify { background: #000; }
.attack { background: #d00000; font-size: 0.85rem; margin-top: 25px; }

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    display: none;
    text-align: left;
}
.success { background: #f0fff4; border: 1px solid #c6f6d5; }
.fail { background: #fff5f5; border: 1px solid #fed7d7; }

.small {
    margin-top: 20px;
    font-size: 0.75rem;
    color: #999;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">CASIO Genuine Verification</div>

    <div id="status">
        「真贋検証を開始」を押してタグをスキャン
    </div>

    <button class="btn verify" onclick="startScan()">
        真贋検証を開始
    </button>

    <button class="btn attack" onclick="attackWrite()">
        【デモ】攻撃者による改ざん試行
    </button>

    <div id="result" class="result"></div>
</div>

<div class="small">
※Android Chrome NFC対応端末専用<br>
※UIDは補助情報です
</div>

<script>
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");

// ===== 疑似秘密鍵（PoC用）=====
const SECRET = "CASIO_SECRET_KEY";

// ===== 簡易ハッシュ =====
function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }
    return hash.toString();
}

// ===== 疑似署名検証 =====
function verifySignature(productId, signature) {
    const expected = simpleHash(productId + SECRET);
    return expected === signature;
}

// ===== モッククラウド照合 =====
function verifyWithCloud(id, sig) {
    return new Promise(resolve => {
        setTimeout(() => {
            resolve(verifySignature(id, sig));
        }, 400);
    });
}

// ===== NFCスキャン =====
async function startScan() {

    if (!("NDEFReader" in window)) {
        alert("Web NFC非対応です（Android Chrome）");
        return;
    }

    try {
        const ndef = new NDEFReader();
        await ndef.scan();

        statusDiv.innerHTML = "スキャン待機中...";

        ndef.onreading = async (event) => {

            let productId = "";
            let signature = "";

            try {
                for (const record of event.message.records) {
                    const text = new TextDecoder().decode(record.data);

                    // JSON形式を想定
                    const obj = JSON.parse(text);
                    productId = obj.id;
                    signature = obj.sig;
                }
            } catch (e) {
                showError("データ形式エラー");
                return;
            }

            statusDiv.innerHTML = "クラウド照合中...";

            const isValid = await verifyWithCloud(productId, signature);

            if (isValid) {
                showSuccess(event.serialNumber, productId);
            } else {
                showFake(event.serialNumber, productId);
            }
        };

        ndef.onreadingerror = () => {
            statusDiv.innerHTML = "読み取り失敗。再度かざしてください";
        };

    } catch (e) {
        statusDiv.innerText = "エラー：" + e;
    }
}

// ===== 成功 =====
function showSuccess(uid, id) {
    statusDiv.innerHTML = "検証完了";

    resultDiv.className = "result success";
    resultDiv.style.display = "block";

    resultDiv.innerHTML = `
        <center><strong>✅ AUTHENTIC PRODUCT</strong></center><hr>

        <b>Product ID:</b> ${id}<br>
        <b>UID:</b> ${uid}（参考情報）<br><br>

        <b>検証結果</b><br>
        ・個体データ一致<br>
        ・識別ロジック検証OK<br>
        ・クラウド照合OK<br><br>

        <b>ビジネス効果</b><br>
        ・模倣品排除<br>
        ・ブランド保護<br>
        ・流通可視化
    `;
}

// ===== 偽物 =====
function showFake(uid, id) {
    statusDiv.innerHTML = "検証完了";

    resultDiv.className = "result fail";
    resultDiv.style.display = "block";

    resultDiv.innerHTML = `
        <center><strong>❌ WARNING</strong></center><hr>

        <b>Product ID:</b> ${id || "不明"}<br>
        <b>UID:</b> ${uid}（参考情報）<br><br>

        <b>異常内容</b><br>
        ・識別データ不一致<br>
        ・未登録または改ざんの可能性<br><br>

        ⚠️ 不正流通の疑い
    `;
}

// ===== エラー =====
function showError(msg) {
    resultDiv.className = "result fail";
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "⚠️ " + msg;
}

// ===== 攻撃シナリオ =====
async function attackWrite() {

    try {
        const ndef = new NDEFReader();

        statusDiv.innerHTML = "攻撃者が偽造データを書き込み中...";

        // JSON形式で偽造
        const fakeData = JSON.stringify({
            id: "99999",
            sig: "000000"
        });

        await ndef.write(fakeData);

        resultDiv.className = "result fail";
        resultDiv.style.display = "block";

        resultDiv.innerHTML = `
            ⚠️ 書き込み成功<br><br>
            → 正規品と見分けがつかない偽造タグを生成可能
        `;

    } catch (e) {

        resultDiv.className = "result success";
        resultDiv.style.display = "block";

        resultDiv.innerHTML = `
            🛡️ 改ざんブロック成功<br><br>
            書き込みが拒否されました（タグ設定による）
        `;

        statusDiv.innerHTML = "防御成功";
    }
}
</script>

</body>
</html>
